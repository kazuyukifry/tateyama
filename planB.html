  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"53b0e1c5-a9bf-432f-8a38-c6001ebff66f\"><\/script>\n<\/head>\n<body>\n\n<x-dc>\n<helmet>\n<style>/* ============================================================\n   kfgopro — Colors & Type\n   On-location portrait photographer · Yokohama / Kanagawa, JP\n   Soft pastel, warm, hand-crafted. Rounded gothic + handwriting.\n   Import this file, then use the semantic vars below.\n   ============================================================ */\n\n/* fonts loaded at runtime via JS-injected <link> to keep the standalone file small */\n\n:root {\n  /* ---- Core palette : four soft accents over warm cream ---- */\n  --mint:      #9fd9c1;   --mint-soft:  #e3f5ee;\n  --sky:       #9cd1ea;   --sky-soft:   #e1f2fa;\n  --lav:       #c3b1e6;   --lav-soft:   #efe9fa;\n  --peach:     #f4a9a2;   --peach-soft: #fde6e3;\n\n  /* deeper sky for high-contrast UI (links, primary actions) */\n  --sky-deep:  #3a8dc4;\n\n  /* ---- Ink (text) ramp ---- */\n  --ink:       #5a5450;   /* body text          */\n  --ink-strong:#4a4540;   /* headings           */\n  --ink-soft:  #8c847e;   /* captions / muted   */\n\n  /* ---- Surfaces ---- */\n  --cream:     #fffaf5;   /* page background    */\n  --surface:   #ffffff;   /* cards              */\n  --surface-2: rgba(255,255,255,.70); /* glassy panels */\n\n  /* ---- Foreground semantic aliases ---- */\n  --fg1: var(--ink-strong);   /* primary text     */\n  --fg2: var(--ink);          /* secondary text   */\n  --fg3: var(--ink-soft);     /* tertiary / muted */\n\n  /* ---- Hairlines & borders ---- */\n  --line:        rgba(140,132,126,.20);\n  --line-dashed: rgba(156,209,234,.55);\n\n  /* ---- The signature multi-radial cream wash background ---- */\n  --bg-wash:\n    radial-gradient(60% 45% at 12% 8%,  var(--peach-soft) 0%, transparent 60%),\n    radial-gradient(55% 40% x-wrap:wrap; }\n.kf-mlabel { flex:0 0 auto; font-size:12px; font-weight:var(--w-bold); color:#fff; background:var(--accent); padding:4px 14px; border-radius:var(--r-pill); letter-spacing:.08em; }\n.kf-mtext { font-size:var(--t-body); color:var(--ink); }\n.kf-tags { display:flex; flex-wrap:wrap; gap:8px; }\n.kf-tag { font-size:var(--t-small); background:var(--accent-soft); color:var(--ink); padding:4px 14px; border-radius:var(--r-pill); border:1.5px solid var(--accent); }\n\n/* ---------- timeline ---------- */\n.kf-tlhead { display:flex; align-items:center; gap:10px; font-size:clamp(13px,2.8vw,15px); font-weight:var(--w-bold); color:var(--accent); margin-bottom:clamp(14px,2.5vw,18px); letter-spacing:.06em; }\n.kf-tlhead::after { content:\"\"; flex:1; height:2px; border-radius:2px; background:var(--accent-soft); }\n.kf-timeline { position:relative; padding-left:clamp(72px,17vw,92px); }\n.kf-timeline::before { content:\"\"; position:absolute; top:8px; bottom:8px; left:clamp(58px,14vw,74px); width:2px; background:var(--accent-soft); }\n.kf-step { position:relative; padding-bottom:clamp(16px,3vw,20px); }\n.kf-step:last-child { padding-bottom:0; }\n.kf-time { position:absolute; left:calc(-1 * clamp(72px,17vw,92px)); top:-1px; width:clamp(48px,11vw,56px); text-align:right; font-family:var(--font-hand); font-weight:var(--w-med); font-size:clamp(12px,2.7vw,14px); color:var(--accent); }\n.kf-step::before { content:\"\"; position:absolute; left:calc(-1 * clamp(72px,17vw,92px) + clamp(58px,14vw,74px) - 5px); top:6px; width:12px; height:12px; border-radius:50%; background:#fff; border:3px solid var(--accent); }\n.kf-act { font-size:var(--t-body); color:var(--ink); line-height:1.7; }\n.kf-stepnote { font-size:clamp(12px,2.6vw,13px); color:var(--ink-soft); }\n.kf-step.is-end::before { background:var(--accent); }\n.kf-step.is-end .kf-act { font-weight:var(--w-bold); }\n\n/* ---------- choose action ---------- */\n.kf-choose { margin-top:clamp(18px,3vw,24px); display:flex; justify- span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:var(--ink-soft);text-transform:uppercase;white-space:nowrap;\">Northern Alps · Karamatsu<\/span>\n          <span style=\"width:24px;height:2px;border-radius:2px;background:var(--peach);\"><\/span>\n        <\/div>\n\n        <div style=\"display:inline-flex;align-items:center;gap:8px;white-space:nowrap;background:rgba(255,255,255,.78);border:1.5px solid var(--mint);color:#3f8f6f;font-weight:700;font-size:var(--t-small);padding:8px 18px;border-radius:var(--r-pill);box-shadow:var(--shadow-soft);backdrop-filter:blur(2px);margin-bottom:clamp(20px,4vw,28px);\">\n          <span>メンバー4名 確定<\/span><span style=\"color:var(--peach);font-size:1.1em;\">♡<\/span>\n        <\/div>\n\n        <h1 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(30px,8.4vw,56px);line-height:1.5;color:var(--ink-strong);margin:0 0 clamp(20px,4vw,30px);text-wrap:balance;\">もうひとつの<br>北アルプスへ。<\/h1>\n\n        <div style=\"display:inline-flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px 12px;font-family:var(--font-hand);font-size:var(--t-lead);color:var(--ink);background:rgba(255,255,255,.7);border:1.5px dashed var(--line-dashed);border-radius:var(--r-pill);padding:clamp(11px,2.5vw,15px) clamp(18px,4vw,30px);backdrop-filter:blur(2px);\">\n          <span style=\"color:var(--sky-deep);font-weight:600;\">2026年7月11日（土）〜12日（日）<\/span>\n          <span style=\"width:5px;height:5px;border-radius:50%;background:var(--lav);\"><\/span>\n          <span>唐松岳 八方尾根<\/span>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ② ルート変更のご案内 ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--peach);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:var(--peach);text-transform:uppercase;white-space:nowrap;\">A Gentle Note<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--peach);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(22px,4.5vw,34px);\">もうひとつの選択肢について<\/h2>\n\n      <div style=\"position:relative;background:linear-gradient(180deg,#fffdf9,#fff7ef);border-radius:var(--r-card);padding:clamp(26px,5.5vw,46px) clamp(22px,5vw,44px) clamp(26px,5.5vw,46px) clamp(26px,6vw,50px);box-shadow:var(--shadow-card);border-left:6px solid var(--peach);\">\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">2日間の旅をいっしょに計画しながら、7月上旬の立山の状況を改めて確認してみました。<\/p>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">この時期の立山・室堂エリアは、例年まだ多くの残雪が残っており、特に室堂から一の越山荘へ向かうルートでは、急傾斜の雪面を横切る場面が出てきます。雪の斜面の横断は、傾斜次第では滑落のリスクが伴う場面でもあります。今回は北アルプスがはじめてのメンバーもいるので、全員が安心して楽しめることを最優先に、少し慎重に考えてみることにしました。<\/p>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">そこで、代替ルートとして「唐松岳（八方尾根ルート）」を並行で準備しています。<\/p>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">唐松岳のルートにも7月上旬は一部残雪が残る可能性はあります。ただ立山と大きく違うのは、<span style=\"background:linear-gradient(transparent 58%, var(--peach-soft) 58%);font-weight:700;color:var(--ink-strong);\">「雪の急斜面を横断する場面がない」<\/span>こと。尾根に沿った整備された登山道で、万が一雪が残っていても、チェーンスパイクで十分に対処できる性質のものです。<\/p>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">ちなみに、今年は雪解けが例年より早いという情報もあります。立山のルートも、直前の状況次第では十分に楽しめる可能性があります。残雪の情報を慎重に見ながら、できれば<span style=\"font-weight:700;color:var(--sky-deep);\">2週間以内には最終判断<\/span>する予定です。<\/p>\n        <p style=\"font-size:var(--t-lead);font-family:var(--font-hand);line-height:1.9;color:var(--ink-strong);margin:1.4em 0 0;text-align:center;\">どちらのルートになっても、最高の2日間になることは変わりません。<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ③ スペック ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--sky);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:var(--sky-deep);text-transform:uppercase;white-space:nowrap;\">At a Glance<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--sky);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(24px,5vw,38px);\">ひと目でわかる<\/h2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:clamp(10px,2.5vw,16px);\">\n        <div style=\"background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-panel);padding:clamp(18px,3.6vw,24px) clamp(14px,3vw,18px);text-align:center;box-shadow:var(--shadow-panel);\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--sky-deep)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3.5\" y=\"5\" width=\"17\" height=\"15\" rx=\"3\"><\/rect><path d=\"M3.5 9h17M8 3v4M16 3v4\"><\/path><\/svg>\n          <div style=\"font-size:var(--t-eyebrow);letter-spacing:.2em;color:var(--sky-deep);font-weight:700;text-transform:uppercase;margin:10px 0 3px;\">Date<\/div>\n          <div style=\"font-family:var(--font-display);font-weight:900;color:var(--ink-strong);font-size:clamp(14px,3.2vw,1   <div style=\"font-size:var(--t-small);color:var(--ink);line-height:1.7;\">唐松岳頂上山荘<br>（1泊2食付）<\/div>\n        <\/div>\n        <div style=\"background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-panel);padding:clamp(18px,3.6vw,24px) clamp(14px,3vw,18px);text-align:center;box-shadow:var(--shadow-panel);\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--sky-deep)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"8\" r=\"2.6\"><\/circle><circle cx=\"16\" cy=\"9\" r=\"2.1\"><\/circle><path d=\"M4 19c0-2.8 2.2-4.6 5-4.6s5 1.8 5 4.6M14.5 19c0-2.2 1.3-3.9 3.4-3.9 1.7 0 3.1 1.1 3.1 3.2\"><\/path><\/svg>\n          <div style=\"font-size:var(--t-eyebrow);letter-spacing:.2em;color:var(--sky-deep);font-weight:700;text-transform:uppercase;margin:10px 0 3px;\">Members<\/div>\n          <div style=\"font-family:var(--font-display);font-weight:900;color:var(--ink-strong);font-size:clamp(14px,3.2vw,16px);margin-bottom:6px;\">参加メンバー<\/div>\n          <div style=\"font-size:var(--t-small);color:var(--ink);line-height:1.7;\">4名（確定）<\/div>\n        <\/div>\n        <div style=\"background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-panel);padding:clamp(18px,3.6vw,24px) clamp(14px,3vw,18px);text-align:center;box-shadow:var(--shadow-panel);\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--sky-deep)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 21V4\"><\/path><path d=\"M6 5c3-1.6 6 1.2 9-.2v7c-3 1.4-6-1.4-9 .2\"><\/path><\/svg>\n          <div style=\"font-size:var(--t-eyebrow);letter-spacing:.2em;color:var(--sky-deep);font-weight:700;text-transform:uppercase;margin:10px 0 3px;\">Meet<\/div>\n          <div style=\"font-family:var(--font-display);font-weight:900;color:var(--ink-strong);font-size:clamp(14px,3.2vw,16px);margin-bottom:6px;\">集合<\/div>\n          <div style=\"font-size:var(--t-small);color:var(--ink);line-height:1.7;\">前日深夜、都内の駅<br>（相乗りで移動）<\/div>\n        <\/div>\n        <div style=\"background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-panel);padding:clamp(18px,3.6vw,24px) clamp(14px,3vw,18px);text-align:center;box-shadow:var(--shadow-panel);\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--sky-deep)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 8 21 5\"><\/path><circle cx=\"6\" cy=\"8.4\" r=\"1\"><\/circle><circle cx=\"19\" cy=\"5.6\" r=\"1\"><\/circle><rect x=\"8.5\" y=\"11\" width=\"7\" height=\"5\" rx=\"1.4\"><\/rect><path d=\"M12 8.8V11M12 16v4\"><\/path><\/svg>\n          <div style=\"font-size:var(--t-eyebrow);letter-spacing:.2em;color:var(--sky-deep);font-weight:700;text-transform:uppercase;margin:10px 0 3px;\">Access<\/div>\n          <div style=\"font-family:var(--font-display);font-weight:900;color:var(--ink-strong);font-size:clamp(14px,3.2vw,16px);margin-bottom:6px;\">アクセス<\/div>\n          <div style=\"font-size:var(--t-small);color:var(--ink);line-height:1.7;\">白馬八方尾根 八方アルペンライン<br>（ゴンドラ＋リフト2本）<\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ④ 唐松岳ってどんなところ？ ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--mint);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:#5bb892;text-transform:uppercase;white-space:nowrap;\">What is Karamatsu<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--mint);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(22px,4.5vw,34px);\">唐松岳ってどんなところ？<\/h2>\n\n      <div style=\"background:var(--surface);border-radius:var(--r-card);padding:clamp(24px,5vw,42px);box-shadow:var(--shadow-card);position:relative;\">\n        <div style=\"position:absolute;inset:0;border-radius:var(--r-card);border:2px solid var(--mint);opacity:.26;pointer-events:none;\"><\/div>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">後立山連峰に属する標高2,696mの山。<span style=\"background:linear-gradient(transparent 58%, var(--mint-soft) 58%);font-weight:700;color:var(--ink-strong);\">「北アルプス入門の名峰」<\/span>として知られ、整備されたルートと圧倒的な絶景が両立している、少し特別な山です。<\/p>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">八方尾根スキー場のゴンドラとリフトを乗り継ぐ「八方アルペンライン」で、標高1,830mの登山口まで約40分でアクセス可能。そこからが本格的な北アルプスのはじまりです。<\/p>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">登山道はよく整備されており、危険箇所なし。はじめての北アルプスとして、多くの人がこの山を選んでいます。<\/p>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0 0 1.15em;\">途中の「八方池」は、白馬三山が水面に映る鏡のような絶景スポット。さらに上ると、目の前に剱岳がそびえ立つ唐松岳頂上山荘に到着。食堂の大きな窓から眺める剱岳と立山連峰の景色は、一生忘れられない体験になるはず。<\/p>\n        <p style=\"font-size:var(--t-body);line-height:1.95;color:var(--ink);margin:0;\">7月はコマクサ（高山植物の女王）の見頃でもあります。砂礫の斜面にひっそりと咲くピンクの花は、写真に残したくなる美しさです。<\/p>\n\n        <!-- YouTube embed here -->\n        <div style=\"margin-top:clamp(22px,4.5vw,32px);position:relative;width:100%;aspect-ratio:16/9;border-radius:var(--r-photo);overflow:hidden;\">\n          <iframe src=\"https://www.youtube.com/embed/VcE9XvyggEs\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0;\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture\" allowfullscreen title=\"唐松岳\"><\/iframe>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ⑤ この旅で出会える景色 ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--lav);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:#9a82cf;text-transform:uppercase;white-space:nowrap;\">Scenes to Meet<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--lav);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(24px,5vw,38px);\">この旅で出会える景色<\/h2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:clamp(16px,3.5vw,24px);\">\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);overflow:hidden;position:relative;\">\n          <div style=\"aspect-ratio:4/3;position:relative;overflow:hidden;\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/06/karamatsu_p1.jpg\" alt=\"八方池\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;\">\n            <span style=\"position:absolute;bottom:14px;left:14px;font-size:var(--t-small);background:rgba(255,255,255,.85);color:var(--ink);padding:4px 12px;border-radius:var(--r-pill);font-weight:700;white-space:nowrap;\">📷 八方池<\/span>\n          <\/div>\n          <div style=\"padding:clamp(16px,3.5vw,22px);\">\n            <h3 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(16px,3.8vw,19px);color:var(--ink-strong);margin:0 0 8px;line-height:1.4;\">八方池のリフレクション<\/h3>\n            <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0;\">白馬岳・杓子岳・白馬鑓ヶ岳（白馬三山）が水面に映る「逆さ三山」。早朝の無風の条件が狙い目。北アルプスでも指折りの写真スポット。<\/p>\n          <\/div>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);overflow:hidden;position:relative;\">\n          <div style=\"aspect-ratio:4/3;position:relative;overflow:hidden;\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/06/karamatsu_p2.jpg\" alt=\"丸山ケルン付近からの眺望\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;\">\n            <span style=\"position:absolute;bottom:14px;left:14px;font-size:var(--t-small);background:rgba(255,255,255,.85);color:var(--ink);padding:4px 12px;border-radius:var(--r-pill);font-weight:700;white-space:nowrap;\">⛰ 丸山ケルン<\/span>\n          <\/div>\n          <div style=\"padding:clamp(16px,3.5vw,22px);\">\n            <h3 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(16px,3.8vw,19px);color:var(--ink-strong);margin:0 0 8px;line-height:1.4;\">丸山ケルン付近からの眺望<\/h3>\n            <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0;\">森林限界を超えた瞬間に視界が一気に開ける。目の前に迫る不帰嶮（かえらずのけん）の岩壁と空のコントラストが圧巻。<\/p>\n          <\/div>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);overflow:hidden;position:relative;\">\n          <div style=\"aspect-ratio:4/3;position:relative;overflow:hidden;\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/06/karamatsu_p3.jpg\" alt=\"唐松岳山頂から見る剱岳\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;\">\n            <span style=\"position:absolute;bottom:14px;left:14px;font-size:var(--t-small);background:rgba(255,255,255,.85);color:var(--ink);padding:4px 12px;border-radius:var(--r-pill);font-weight:700;white-space:nowrap;\">★ 山頂<\/span>\n          <\/div>\n          <div style=\"padding:clamp(16px,3.5vw,22px);\">\n            <h3 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(16px,3.8vw,19px);color:var(--ink-strong);margin:0 0 8px;line-height:1.4;\">唐松岳山頂から見る剱岳<\/h3>\n            <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0;\">360度のパノラマ。黒部の谷を挟んで目の前にそびえる剱岳は、どこから見てもドラマチック。<\/p>\n          <\/div>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);overflow:hidden;position:relative;\">\n          <div style=\"aspect-ratio:4/3;position:relative;overflow:hidden;\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/06/karamatsu_p4.jpg\" alt=\"コマクサの群生\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;\">\n            <span style=\"position:absolute;bottom:14px;left:14px;font-size:var(--t-small);background:rgba(255,255,255,.85);color:var(--ink);padding:4px 12px;border-radius:var(--r-pill);font-weight:700;white-space:nowrap;\">🌸 コマクサ<\/span>\n          <\/div>\n          <div style=\"padding:clamp(16px,3.5vw,22px);\">\n            <h3 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(16px,3.8vw,19px);color:var(--ink-strong);margin:0 0 8px;line-height:1.4;\">コマクサの群生<\/h3>\n            <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0;\">山頂直下の砂礫地に咲く、可憐なピンクの花。7月上〜中旬が最盛期。高山植物の女王と呼ばれるにふさわしい存在感。<\/p>\n          <\/div>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);overflow:hidden;position:relative;\">\n          <div style=\"aspect-ratio:4/3;position:relative;overflow:hidden;\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/06/karamatsu_p5.jpg\" alt=\"山荘食堂の剱岳ビュー\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;\">\n            <span style=\"position:absolute;bottom:14px;left:14px;font-size:var(--t-small);background:rgba(255,255,255,.85);color:var(--ink);padding:4px 12px;border-radius:var(--r-pill);font-weight:700;white-space:nowrap;\">🏠 山荘食堂<\/span>\n          <\/div>\n          <div style=\"padding:clamp(16px,3.5vw,22px);\">\n            <h3 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(16px,3.8vw,19px);color:var(--ink-strong);margin:0 0 8px;line-height:1.4;\">山荘食堂の剱岳ビュー<\/h3>\n            <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0;\">大きな窓いっぱいに広がる剱岳・立山連峰。食事しながら眺める山岳写真の舞台として最高の環境。<\/p>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ⑥ 一緒に歩くメンバー ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--peach);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:var(--peach);text-transform:uppercase;white-space:nowrap;\">Members<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--peach);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(24px,5vw,38px);\">一緒に歩くメンバー<\/h2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:clamp(16px,3.5vw,22px);\">\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(20px,4vw,28px) clamp(14px,3vw,18px);text-align:center;\">\n          <div style=\"width:clamp(92px,24vw,116px);height:clamp(92px,24vw,116px);margin:0 auto 14px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 4px #fff, var(--shadow-photo);background:var(--peach-soft);\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/05/sako.jpg\" alt=\"櫻子\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n          <\/div>\n          <div style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(17px,4vw,20px);color:var(--ink-strong);line-height:1.3;\">櫻子<\/div>\n          <div style=\"font-family:var(--font-hand);font-size:var(--t-small);color:var(--peach);letter-spacing:.06em;margin-bottom:10px;\">さこ<\/div>\n          <p style=\"font-size:var(--t-small);line-height:1.8;color:var(--ink);margin:0 0 14px;\">フォトグラファー。山の光と空気を愛している人。<\/p>\n          <a href=\"https://www.instagram.com/sako_photo\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:var(--t-caption);font-weight:700;letter-spacing:.06em;color:var(--peach);background:#fff;border:1.5px solid var(--peach);padding:6px 14px;border-radius:var(--r-pill);text-decoration:none;white-space:nowrap;\" style-hover=\"background:var(--peach);color:#fff;\">Instagram →<\/a>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(20px,4vw,28px) clamp(14px,3vw,18px);text-align:center;\">\n          <div style=\"width:clamp(92px,24vw,116px);height:clamp(92px,24vw,116px);margin:0 auto 14px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 4px #fff, var(--shadow-photo);background:var(--peach-soft);\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/05/rira.jpg\" alt=\"Rira\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n          <\/div>\n          <div style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(17px,4vw,20px);color:var(--ink-strong);line-height:1.3;\">Rira<\/div>\n          <div style=\"font-family:var(--font-hand);font-size:var(--t-small);color:var(--peach);letter-spacing:.06em;margin-bottom:10px;\">りら<\/div>\n          <p style=\"font-size:var(--t-small);line-height:1.8;color:var(--ink);margin:0 0 14px;\">山の景色に魅せられた、写真好きの女の子。<\/p>\n          <a href=\"https://www.instagram.com/rira26_o0\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:var(--t-caption);font-weight:700;letter-spacing:.06em;color:var(--peach);background:#fff;border:1.5px solid var(--peach);padding:6px 14px;border-radius:var(--r-pill);text-decoration:none;white-space:nowrap;\" style-hover=\"background:var(--peach);color:#fff;\">Instagram →<\/a>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(20px,4vw,28px) clamp(14px,3vw,18px);text-align:center;position:relative;\">\n          <span style=\"position:absolute;top:14px;right:14px;font-size:var(--t-caption);font-weight:700;letter-spacing:.1em;color:#fff;background:var(--peach);padding:3px 10px;border-radius:var(--r-pill);\">NEW<\/span>\n          <div style=\"width:clamp(92px,24vw,116px);height:clamp(92px,24vw,116px);margin:0 auto 14px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 4px #fff, var(--shadow-photo);background:var(--peach-soft);\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/06/tune.jpg\" alt=\"ちゅん\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n          <\/div>\n          <div style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(17px,4vw,20px);color:var(--ink-strong);line-height:1.3;\">ちゅん<\/div>\n          <div style=\"font-family:var(--font-hand);font-size:var(--t-small);color:var(--peach);letter-spacing:.06em;margin-bottom:10px;\">Chun<\/div>\n          <p style=\"font-size:var(--t-small);line-height:1.8;color:var(--ink);margin:0 0 14px;\">東京在住。写真と、光のある場所が好き。<\/p>\n          <a href=\"https://www.instagram.com/tune_tune_t\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:var(--t-caption);font-weight:700;letter-spacing:.06em;color:var(--peach);background:#fff;border:1.5px solid var(--peach);padding:6px 14px;border-radius:var(--r-pill);text-decoration:none;white-space:nowrap;\" style-hover=\"background:var(--peach);color:#fff;\">Instagram →<\/a>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(20px,4vw,28px) clamp(14px,3vw,18px);text-align:center;position:relative;\">\n          <span style=\"position:absolute;top:14px;right:14px;font-size:var(--t-caption);font-weight:700;letter-spacing:.1em;color:#5bb892;background:var(--mint-soft);border:1px solid var(--mint);padding:3px 10px;border-radius:var(--r-pill);\">山案内<\/span>\n          <div style=\"width:clamp(92px,24vw,116px);height:clamp(92px,24vw,116px);margin:0 auto 14px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 4px #fff, var(--shadow-photo);background:var(--mint-soft);\">\n            <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/05/kfgopro.jpg\" alt=\"ぺん\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n          <\/div>\n          <div style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(17px,4vw,20px);color:var(--ink-strong);line-height:1.3;\">ぺん<\/div>\n          <div style=\"font-family:var(--font-hand);font-size:var(--t-small);color:#5bb892;letter-spacing:.06em;margin-bottom:10px;\">Pen<\/div>\n          <p style=\"font-size:var(--t-small);line-height:1.8;color:var(--ink);margin:0 0 14px;\">山歩き担当。コース・装備・安全管理を引き受けます。プロのガイドではなく、山好きの仲間です。<\/p>\n          <a href=\"https://www.instagram.com/kfgopro\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:var(--t-caption);font-weight:700;letter-spacing:.06em;color:#5bb892;background:#fff;border:1.5px solid var(--mint);padding:6px 14px;border-radius:var(--r-pill);text-decoration:none;white-space:nowrap;\" style-hover=\"background:var(--mint);color:#fff;\">Instagram →<\/a>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ⑦ 旅の行程 ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--sky);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:var(--sky-deep);text-transform:uppercase;white-space:nowrap;\">Itinerary<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--sky);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(24px,5vw,38px);\">旅の行程（目安）<\/h2>\n\n      <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(22px,5vw,40px);margin-bottom:clamp(20px,4vw,28px);--accent:var(--sky);--accent-soft:var(--sky-soft);\">\n        <div class=\"kf-tlhead\">1DAY　移動 ＆ 唐松岳頂上山荘へ<\/div>\n        <div class=\"kf-timeline\">\n          <div class=\"kf-step\"><span class=\"kf-time\">0:30<\/span><div class=\"kf-act\">都内の駅で待ち合わせ・出発<br><span class=\"kf-stepnote\">（車での相乗り移動 → 白馬へ）<\/span><\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\">朝<\/span><div class=\"kf-act\">白馬・八方尾根に到着<\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\"><\/span><div class=\"kf-act\">八方アルペンライン乗車（ゴンドラ＋リフト2本、約40分）<br><span class=\"kf-stepnote\">→ 八方池山荘（標高1,830m）<\/span><\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\"><\/span><div class=\"kf-act\">登山スタート。八方池に立ち寄りながら（1時間）<br><span class=\"kf-stepnote\">→ 丸山ケルン（+1.5時間）→ 唐松岳頂上山荘（+40分）<\/span><\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\">昼ごろ<\/span><div class=\"kf-act\">唐松岳頂上山荘 チェックイン。荷物を置いて身軽に<\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\">午後<\/span><div class=\"kf-act\">唐松岳山頂へ（片道約20分）。剱岳と360度のパノラマ<\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\">夕方<\/span><div class=\"kf-act\">山荘前でのんびり。夕日と剱岳を眺める写真タイム<\/div><\/div>\n          <div class=\"kf-step is-end\"><span class=\"kf-time\">夜<\/span><div class=\"kf-act\">夕食（食堂の大窓から剱岳を眺めながら）。早めに就寝<\/div><\/div>\n        <\/div>\n      <\/div>\n\n      <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(22px,5vw,40px);--accent:var(--lav);--accent-soft:var(--lav-soft);\">\n        <div class=\"kf-tlhead\">2DAY　山歩き ＆ 下山<\/div>\n        <div class=\"kf-timeline\">\n          <div class=\"kf-step\"><span class=\"kf-time\">早朝<\/span><div class=\"kf-act\">起床。ご来光タイム<\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\"><\/span><div class=\"kf-act\">朝食。今日も剱岳と一緒に<\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\">午前<\/span><div class=\"kf-act\">下山開始（唐松岳頂上山荘 → 八方池山荘 約3時間）<\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\">昼ごろ<\/span><div class=\"kf-act\">八方池山荘 → 八方アルペンラインで下山<\/div><\/div>\n          <div class=\"kf-step\"><span class=\"kf-time\">昼以降<\/span><div class=\"kf-act\">白馬で温泉（任意）、または帰路へ<\/div><\/div>\n          <div class=\"kf-step is-end\"><span class=\"kf-time\">夕方<\/span><div class=\"kf-act\">帰着（目安）<\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ⑧ コースマップ ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--mint);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:#5bb892;text-transform:uppercase;white-space:nowrap;\">Course Map<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--mint);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(10px,2.5vw,16px);\">山歩きコースマップ<\/h2>\n      <p style=\"text-align:center;font-size:var(--t-small);color:var(--ink-soft);margin:0 0 clamp(18px,4vw,26px);\">ピストン（往復・同じ道を登って降りる）／ 左から右へ標高が上がります<\/p>\n\n      <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(18px,4vw,30px);position:relative;\">\n        <div style=\"position:absolute;inset:0;border-radius:var(--r-card);border:2px solid var(--mint);opacity:.26;pointer-events:none;\"><\/div>\n        <div style=\"text-align:center;font-size:var(--t-caption);color:var(--ink-soft);margin-bottom:8px;\">← 横にスクロールできます →<\/div>\n        <div class=\"km-mapscroll\" style=\"overflow-x:auto;padding-bottom:6px;\">\n          <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/06/coursemap.jpg\" alt=\"山歩きコースマップ\" style=\"width:100%;min-width:760px;height:auto;display:block;border-radius:var(--r-soft);\">\n        <\/div>\n        <!-- Course map image placeholder: replace this SVG with an actual uploaded illustration if available -->\n\n        <div style=\"margin-top:clamp(18px,4vw,26px);overflow:hidden;border-radius:var(--r-soft);border:1.5px solid var(--line);\">\n          <table style=\"width:100%;border-collapse:collapse;font-size:var(--t-small);\">\n            <thead>\n              <tr style=\"background:var(--mint-soft);\">\n                <th style=\"text-align:left;padding:9px 12px;color:#3f9670;font-weight:700;white-space:nowrap;\">時刻<\/th>\n                <th style=\"text-align:left;padding:9px 12px;color:#3f9670;font-weight:700;\">区間<\/th>\n                <th style=\"text-align:left;padding:9px 12px;color:#3f9670;font-weight:700;\">備考<\/th>\n              <\/tr>\n            <\/thead>\n            <tbody style=\"color:var(--ink);\">\n              <tr style=\"border-top:1px solid var(--line);\"><td style=\"padding:9px 12px;font-family:var(--font-hand);color:#3f9670;white-space:nowrap;\">スタート<\/td><td style=\"padding:9px 12px;\">八方池山荘（1,830m）<\/td><td style=\"padding:9px 12px;color:var(--ink-soft);\">ここから登山道<\/td><\/tr>\n              <tr style=\"border-top:1px solid var(--line);\"><td style=\"padding:9px 12px;font-family:var(--font-hand);color:#3f9670;white-space:nowrap;\">+1時間<\/td><td style=\"padding:9px 12px;\">八方池（2,060m）<\/td><td style=\"padding:9px 12px;color:var(--ink-soft);\">リフレクションスポット<\/td><\/tr>\n              <tr style=\"border-top:1px solid var(--line);\"><td style=\"padding:9px 12px;font-family:var(--font-hand);color:#3f9670;white-space:nowrap;\">+2.5時間<\/td><td style=\"padding:9px 12px;\">丸山ケルン（2,430m）<\/td><td style=\"padding:9px 12px;color:var(--ink-soft);\">視界が広がる！<\/td><\/tr>\n              <tr style=\"border-top:1px solid var(--line);\"><td style=\"padding:9px 12px;font-family:var(--font-hand);color:#3f9670;white-space:nowrap;\">+3.5時間<\/td><td style=\"padding:9px 12px;\">唐松岳頂上山荘（2,620m）<\/td><td style=\"padding:9px 12px;color:var(--ink-soft);\">山荘でひと息<\/td><\/tr>\n              <tr style=\"border-top:1px solid var(--line);\"><td style=\"padding:9px 12px;font-family:var(--font-hand);color:#d2655c;white-space:nowrap;\">+4時間<\/td><td style=\"padding:9px 12px;font-weight:700;\">唐松岳山頂（2,696m）★<\/td><td style=\"padding:9px 12px;color:var(--ink-soft);\">剱岳が目の前に<\/td><\/tr>\n            <\/tbody>\n          <\/table>\n        <\/div>\n        <p style=\"font-size:var(--t-caption);color:var(--ink-soft);margin:12px 2px 0;\">※ 当日の天候・体調に合わせて、無理のない範囲で歩きます。<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ⑨ 費用について ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--sky);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:var(--sky-deep);text-transform:uppercase;white-space:nowrap;\">Cost<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--sky);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(24px,5vw,38px);\">費用について<\/h2>\n\n      <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(22px,5vw,40px);\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1.5px dashed var(--line-dashed);\">\n          <span style=\"font-size:var(--t-body);color:var(--ink);\">山小屋代（1泊2食）<\/span>\n          <span style=\"font-family:var(--font-hand);font-weight:600;font-size:var(--t-body);color:var(--sky-deep);white-space:nowrap;\">16,000〜17,000円<\/span>\n        <\/div>\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1.5px dashed var(--line-dashed);\">\n          <span style=\"font-size:var(--t-body);color:var(--ink);\">八方アルペンライン代（往復）<\/span>\n          <span style=\"font-family:var(--font-hand);font-weight:600;font-size:var(--t-body);color:var(--sky-deep);white-space:nowrap;\">3,500円<\/span>\n        <\/div>\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1.5px dashed var(--line-dashed);\">\n          <span style=\"font-size:var(--t-body);color:var(--ink);\">白馬までの交通費（割勘）<\/span>\n          <span style=\"font-family:var(--font-hand);font-weight:600;font-size:var(--t-body);color:var(--sky-deep);white-space:nowrap;\">約4,000〜5,000円<\/span>\n        <\/div>\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:14px 0;\">\n          <span style=\"font-size:var(--t-body);color:var(--ink);\">その他雑費（飲み物・行動食など）<\/span>\n          <span style=\"font-family:var(--font-hand);font-weight:600;font-size:var(--t-body);color:var(--ink-soft);white-space:nowrap;\">各自<\/span>\n        <\/div>\n        <div style=\"margin-top:18px;padding:12px 16px;background:var(--sky-soft);border-radius:var(--r-soft);font-size:var(--t-small);color:var(--ink);\">※ 金額は目安です。詳しくは個別にご案内しますね。<\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ⑩ もちもの ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--peach);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:var(--peach);text-transform:uppercase;white-space:nowrap;\">Gear<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--peach);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(16px,3.5vw,24px);\">もちもの<\/h2>\n      <p style=\"text-align:center;font-size:var(--t-body);line-height:1.9;color:var(--ink);max-width:620px;margin:0 auto clamp(24px,5vw,34px);\">唐松岳の登山道は整備されていますが、山の天気は変わりやすく、7月上旬は一部に残雪が残る可能性もあります。以下の準備はしっかりと。<\/p>\n\n      <h3 style=\"text-align:center;font-family:var(--font-hand);font-weight:600;font-size:var(--t-h3);color:var(--peach);margin:0 0 clamp(18px,4vw,26px);\">山歩きの三種の神器<\/h3>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:clamp(16px,3.5vw,22px);\">\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(20px,4vw,28px);position:relative;\">\n          <div style=\"position:absolute;inset:0;border-radius:var(--r-card);border:2px solid var(--peach);opacity:.24;pointer-events:none;\"><\/div>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\">\n            <span style=\"flex:0 0 auto;width:46px;height:46px;border-radius:50%;background:var(--peach-soft);border:2px solid var(--peach);display:flex;align-items:center;justify-content:center;font-family:var(--font-hand);font-weight:600;font-size:18px;color:var(--peach);\">1<\/span>\n            <h3 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(15px,3.6vw,18px);color:var(--ink-strong);line-height:1.4;margin:0;\">登山靴<br><span style=\"font-size:.82em;color:var(--ink-soft);font-weight:700;\">（ハイキングシューズ以上）<\/span><\/h3>\n          <\/div>\n          <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0;\">スニーカーは不可。グリップのしっかりしたハイキングシューズまたはトレッキングシューズが必要です。足首をしっかりホールドできるものが安心です。<\/p>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(20px,4vw,28px);position:relative;\">\n          <div style=\"position:absolute;inset:0;border-radius:var(--r-card);border:2px solid var(--peach);opacity:.24;pointer-events:none;\"><\/div>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\">\n            <span style=\"flex:0 0 auto;width:46px;height:46px;border-radius:50%;background:var(--peach-soft);border:2px solid var(--peach);display:flex;align-items:center;justify-content:center;font-family:var(--font-hand);font-weight:600;font-size:18px;color:var(--peach);\">2<\/span>\n            <h3 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(15px,3.6vw,18px);color:var(--ink-strong);line-height:1.4;margin:0;\">レインウェア<br><span style=\"font-size:.82em;color:var(--ink-soft);font-weight:700;\">（上下セパレート）<\/span><\/h3>\n          <\/div>\n          <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0;\">稜線付近は天気が急変しやすいです。コンビニのカッパではなく、本格的なレインウェアを。折りたためてザックに収まるものがベストです。<\/p>\n        <\/div>\n        <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(20px,4vw,28px);position:relative;\">\n          <div style=\"position:absolute;inset:0;border-radius:var(--r-card);border:2px solid var(--peach);opacity:.24;pointer-events:none;\"><\/div>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\">\n            <span style=\"flex:0 0 auto;width:46px;height:46px;border-radius:50%;background:var(--peach-soft);border:2px solid var(--peach);display:flex;align-items:center;justify-content:center;font-family:var(--font-hand);font-weight:600;font-size:18px;color:var(--peach);\">3<\/span>\n            <h3 style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(15px,3.6vw,18px);color:var(--ink-strong);line-height:1.4;margin:0;\">ザック<br><span style=\"font-size:.82em;color:var(--ink-soft);font-weight:700;\">（リュック）<\/span><\/h3>\n          <\/div>\n          <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0;\">1泊分の荷物が入る25〜30Lが目安。古いものでも問題ありません。お持ちでない方はお貸しできます（要相談）。<\/p>\n        <\/div>\n      <\/div>\n\n      <div style=\"margin-top:clamp(18px,4vw,24px);background:var(--surface-2);border:1.5px dashed var(--line-dashed);border-radius:var(--r-panel);padding:clamp(18px,4vw,26px);backdrop-filter:blur(2px);\">\n        <div style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(14px,3.4vw,16px);color:var(--ink-strong);margin-bottom:8px;\">チェーンスパイクについて（持参推奨）<\/div>\n        <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink);margin:0 0 .9em;\">7月上旬は登山道の一部に残雪が残っていることがあります。軽量なチェーンスパイクを1セット持参するとより安心です。使わずに済むかもしれませんが、持っていると心強い保険になります。<\/p>\n        <p style=\"font-size:var(--t-small);line-height:1.85;color:var(--ink-soft);margin:0;\">小物類（帽子・手袋・サングラスなど）は別途ご案内しますね。<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ⑪ トイレについて ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--mint);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:#5bb892;text-transform:uppercase;white-space:nowrap;\">Restrooms<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--mint);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(24px,5vw,38px);\">トイレについて<\/h2>\n\n      <div style=\"background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow-card);padding:clamp(22px,5vw,40px);\">\n        <p style=\"font-size:var(--t-body);line-height:1.9;color:var(--ink);margin:0 0 1.2em;\">このコースは、要所ごとにトイレが確保されていて、比較的安心して歩けます。<\/p>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--mint);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:2px;\">✓<\/span><div style=\"font-size:var(--t-small);line-height:1.8;color:var(--ink);\"><strong style=\"color:var(--ink-strong);\">八方池山荘前<\/strong>：公衆トイレあり（快適）<\/div><\/div>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--mint);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:2px;\">✓<\/span><div style=\"font-size:var(--t-small);line-height:1.8;color:var(--ink);\"><strong style=\"color:var(--ink-strong);\">第2ケルン付近<\/strong>：公衆トイレあり（ルート上にあるので安心）<\/div><\/div>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--mint);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:2px;\">✓<\/span><div style=\"font-size:var(--t-small);line-height:1.8;color:var(--ink);\"><strong style=\"color:var(--ink-strong);\">唐松岳頂上山荘<\/strong>：洋式トイレあり、清潔に保たれています<\/div><\/div>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--peach-soft);color:var(--peach);border:1.5px solid var(--peach);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:2px;\">!<\/span><div style=\"font-size:var(--t-small);line-height:1.8;color:var(--ink);\"><strong style=\"color:var(--ink-strong);\">山頂付近<\/strong>：トイレなし（山荘で済ませておくのがベスト）<\/div><\/div>\n        <\/div>\n        <div style=\"margin-top:18px;padding:12px 16px;background:var(--mint-soft);border-radius:var(--r-soft);font-size:var(--t-small);line-height:1.8;color:var(--ink);\">山のトイレは<strong style=\"color:var(--ink-strong);\">協力金（100〜200円程度）<\/strong>をお願いしていることが多いので、小銭の準備を。<\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== ⑫ 参考リンク ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(48px,9vw,80px);\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;\">\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--lav);\"><\/span>\n        <span style=\"font-family:var(--font-display);font-size:var(--t-eyebrow);font-weight:700;letter-spacing:.42em;padding-left:.42em;color:#9a82cf;text-transform:uppercase;white-space:nowrap;\">Links<\/span>\n        <span style=\"width:24px;height:2px;border-radius:2px;background:var(--lav);\"><\/span>\n      <\/div>\n      <h2 style=\"text-align:center;font-family:var(--font-display);font-weight:900;font-size:var(--t-h2);color:var(--ink-strong);line-height:1.4;margin:0 0 clamp(24px,5vw,38px);\">参考リンク<\/h2>\n\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <a href=\"http://karamatsu.jp/\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:14px;background:var(--surface);border:1.5px solid var(--lav);border-radius:var(--r-panel);padding:clamp(16px,3.5vw,22px);text-decoration:none;box-shadow:var(--shadow-panel);\" style-hover=\"background:var(--lav);\">\n          <div style=\"flex:1;\">\n            <div style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(15px,3.6vw,17px);color:var(--ink-strong);margin-bottom:3px;\">唐松岳頂上山荘<\/div>\n            <div style=\"font-size:var(--t-small);color:var(--ink-soft);line-height:1.6;\">今回の宿泊先・唐松岳頂上山荘の公式サイト<\/div>\n          <\/div>\n          <span style=\"flex:0 0 auto;font-size:1.3em;color:#9a82cf;\">→<\/span>\n        <\/a>\n        <a href=\"https://www.happo-one.jp/trekking/alpenline/\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:14px;background:var(--surface);border:1.5px solid var(--lav);border-radius:var(--r-panel);padding:clamp(16px,3.5vw,22px);text-decoration:none;box-shadow:var(--shadow-panel);\" style-hover=\"background:var(--lav);\">\n          <div style=\"flex:1;\">\n            <div style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(15px,3.6vw,17px);color:var(--ink-strong);margin-bottom:3px;\">白馬八方尾根<\/div>\n            <div style=\"font-size:var(--t-small);color:var(--ink-soft);line-height:1.6;\">八方アルペンライン（ゴンドラ・リフト）の公式案内<\/div>\n          <\/div>\n          <span style=\"flex:0 0 auto;font-size:1.3em;color:#9a82cf;\">→<\/span>\n        <\/a>\n        <a href=\"https://www.camp-outdoor.com/tozan/index.shtml\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:14px;background:var(--surface);border:1.5px solid var(--lav);border-radius:var(--r-panel);padding:clamp(16px,3.5vw,22px);text-decoration:none;box-shadow:var(--shadow-panel);\" style-hover=\"background:var(--lav);\">\n          <div style=\"flex:1;\">\n            <div style=\"font-family:var(--font-display);font-weight:900;font-size:clamp(15px,3.6vw,17px);color:var(--ink-strong);margin-bottom:3px;\">登山入門<\/div>\n            <div style=\"font-size:var(--t-small);color:var(--ink-soft);line-height:1.6;\">はじめての登山に役立つ知識が揃う入門ガイドサイト<\/div>\n          <\/div>\n          <span style=\"flex:0 0 auto;font-size:1.3em;color:#9a82cf;\">→<\/span>\n        <\/a>\n      <\/div>\n    <\/section>\n\n    <!-- ===== CLOSING ===== -->\n    <section class=\"kf-reveal\" style=\"margin-top:clamp(56px,10vw,88px);\">\n      <x-import component-from-global-scope=\"ClosingNote\" lines=\"{{ closingLines }}\" sign=\"— 最終ルートはまた連絡しますね —\" hint-size=\"100%,240px\"><\/x-import>\n      <div style=\"text-align:center;margin-top:clamp(26px,6vw,40px);\">\n        <img src=\"https://kfgopro.com/wordpress/wp-content/uploads/2026/06/logo-kfgopro.png\" alt=\"kfgopro\" style=\"width:min(52%,230px);height:auto;opacity:.92;\">\n        <div style=\"margin-top:14px;font-family:var(--font-hand);font-size:var(--t-small);color:var(--ink-soft);letter-spacing:.04em;\">唐松岳 or 立山　2026.7.11–12 ／ on-location photo journey<\/div>\n      <\/div>\n    <\/section>\n\n  <\/div>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      closingLines: [\n        \"立山でも唐松岳でも、北アルプスの夏のひかりはおなじようにやさしい。\",\n        \"どこへ向かうことになっても、4人で歩く時間を、楽しみにしています。\",\n      ],\n    };\n  }\n\n  componentDidMount() {\n    try {\n      if (window.matchMedia && window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches) return;\n      if (typeof IntersectionObserver !== \"function\") return;\n      const app = document.querySelector(\".kf-app\");\n      if (!app) return;\n      const io = new IntersectionObserver(\n        (entries) => {\n          entries.forEach((e) => {\n            if (!e.isIntersecting) return;\n            const el = e.target;\n            io.unobserve(el);\n            if (el.dataset.kmIn || !el.animate) return;\n            el.dataset.kmIn = \"1\";\n            // fill defaults to \"none\" -> element returns to its (visible) base style after.\n            el.animate(\n              [\n                { opacity: 0, transform: \"translateY(18px)\" },\n                { opacity: 1, transform: \"none\" },\n              ],\n              { duration: 700, easing: \"cubic-bezier(.4,0,.2,1)\" }\n            );\n          });\n        },\n        { rootMargin: \"0px 0px -6% 0px\", threshold: 0.06 }\n      );\n      // Defer so streamed nodes are present, then observe whatever exists.\n      setTimeout(() => {\n        document.querySelectorAll(\".kf-reveal\").forEach((el) => io.observe(el));\n      }, 60);\n    } catch (e) {}\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"
  </script>
</body>
